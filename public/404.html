<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>おはなしきおく</title>
    <script>
      // GitHub Pages SPA リダイレクト
      // パスをクエリ文字列に変換して index.html に渡す
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
