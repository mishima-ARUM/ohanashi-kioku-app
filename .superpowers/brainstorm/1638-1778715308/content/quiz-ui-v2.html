<h2>回答UI — ① 回答 → ② 色 → ③ 形</h2>
<p class="subtitle">順番を変更しました。確認してください。</p>

<div style="max-width:400px;margin:0 auto;font-family:sans-serif;">

  <!-- 問題表示エリア -->
  <div style="background:#f3e8ff;border-radius:16px;padding:16px;margin-bottom:14px;text-align:center;">
    <div style="font-size:12px;color:#7c3aed;font-weight:bold;margin-bottom:6px;">もんだい 2 ／ 3</div>
    <div style="font-size:18px;font-weight:bold;color:#1f2937;">チューリップは何本さいていましたか？</div>
  </div>

  <!-- ① 回答を選ぶ -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">① 回答を選ぶ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:12px;text-align:center;font-size:18px;cursor:pointer;">3</div>
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:12px;text-align:center;font-size:18px;cursor:pointer;">4</div>
      <div style="border:3px solid #7c3aed;border-radius:12px;padding:12px;text-align:center;font-size:18px;cursor:pointer;background:#f3e8ff;color:#7c3aed;font-weight:bold;">5 ✓</div>
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:12px;text-align:center;font-size:18px;cursor:pointer;">6</div>
    </div>
  </div>

  <!-- ② 色を選ぶ -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">② 色を選ぶ</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:50%;background:#ef4444;border:4px solid #991b1b;box-shadow:0 0 0 3px #fca5a5;"></div>
        <span style="font-size:11px;color:#374151;">赤</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:50%;background:#3b82f6;border:4px solid #1e40af;"></div>
        <span style="font-size:11px;color:#374151;">青</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:50%;background:#22c55e;border:4px solid #15803d;"></div>
        <span style="font-size:11px;color:#374151;">緑</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:50%;background:#eab308;border:4px solid #a16207;"></div>
        <span style="font-size:11px;color:#374151;">黄</span>
      </div>
    </div>
  </div>

  <!-- ③ 形を選ぶ -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">③ 形を選ぶ</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:28px;">○</div>
        <span style="font-size:11px;color:#374151;">まる</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:28px;">△</div>
        <span style="font-size:11px;color:#374151;">さんかく</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:28px;">✕</div>
        <span style="font-size:11px;color:#374151;">ばつ</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:52px;height:52px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:24px;">◎</div>
        <span style="font-size:11px;color:#374151;">にじゅうまる</span>
      </div>
    </div>
  </div>

  <!-- 選択結果（例：赤選択後、5に○をつけた状態） -->
  <div style="background:#fef3c7;border-radius:16px;padding:12px;border:2px solid #fbbf24;">
    <div style="font-size:11px;color:#92400e;margin-bottom:8px;font-weight:bold;">📋 選択した回答</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:white;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:16px;font-weight:bold;color:#374151;">「5」</span>
        <div style="width:22px;height:22px;border-radius:50%;background:#ef4444;flex-shrink:0;"></div>
        <span style="font-size:22px;line-height:1;">○</span>
        <button style="margin-left:auto;border:none;background:#fee2e2;color:#dc2626;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;font-weight:bold;">消す</button>
      </div>
    </div>
    <button style="margin-top:10px;width:100%;padding:10px;border-radius:12px;border:none;background:linear-gradient(to right,#f59e0b,#d97706);color:white;font-weight:bold;font-size:15px;cursor:pointer;">この回答で決定する →</button>
  </div>

</div>

<div class="options" style="margin-top:20px;">
  <div class="option" data-choice="ok" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>このレイアウトでOK</h3>
      <p>① 回答 → ② 色 → ③ 形 → 結果表示</p>
    </div>
  </div>
  <div class="option" data-choice="revise" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>もう少し調整したい</h3>
      <p>見た目・順番・サイズなどを変えたい</p>
    </div>
  </div>
</div>
