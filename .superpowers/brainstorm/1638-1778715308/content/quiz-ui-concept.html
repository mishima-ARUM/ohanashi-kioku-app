<h2>新しい回答UI イメージ確認</h2>
<p class="subtitle">ご説明いただいた内容をもとにモックアップを作成しました。イメージと合っているか確認してください。</p>

<div style="max-width:400px;margin:0 auto;font-family:sans-serif;">

  <!-- 問題表示エリア -->
  <div style="background:#f3e8ff;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;">
    <div style="font-size:12px;color:#7c3aed;font-weight:bold;margin-bottom:8px;">もんだい 2 ／ 3</div>
    <div style="font-size:18px;font-weight:bold;color:#1f2937;">チューリップは何本さいていましたか？</div>
  </div>

  <!-- ① 色マーク行 -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">① 色を選ぶ</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <div style="width:48px;height:48px;border-radius:50%;background:#ef4444;border:3px solid #991b1b;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold;cursor:pointer;">赤</div>
      <div style="width:48px;height:48px;border-radius:50%;background:#3b82f6;border:3px solid #1e40af;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold;cursor:pointer;">青</div>
      <div style="width:48px;height:48px;border-radius:50%;background:#22c55e;border:3px solid #15803d;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold;cursor:pointer;">緑</div>
      <div style="width:48px;height:48px;border-radius:50%;background:#eab308;border:3px solid #a16207;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold;cursor:pointer;">黄</div>
    </div>
  </div>

  <!-- ② 回答選択行 -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">② 回答を選ぶ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center;font-size:16px;cursor:pointer;">3</div>
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center;font-size:16px;cursor:pointer;">4</div>
      <div style="border:3px solid #7c3aed;border-radius:12px;padding:10px;text-align:center;font-size:16px;cursor:pointer;background:#f3e8ff;">5 ✓</div>
      <div style="border:2px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center;font-size:16px;cursor:pointer;">6</div>
    </div>
  </div>

  <!-- ③ 形マーク行 -->
  <div style="background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:bold;">③ 形を選ぶ</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <div style="width:48px;height:48px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;">○</div>
      <div style="width:48px;height:48px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;">△</div>
      <div style="width:48px;height:48px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;">✕</div>
      <div style="width:48px;height:48px;border-radius:8px;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;">◎</div>
    </div>
  </div>

  <!-- 選択結果表示 -->
  <div style="background:#fef3c7;border-radius:16px;padding:12px;margin-bottom:12px;border:2px solid #fbbf24;">
    <div style="font-size:11px;color:#92400e;margin-bottom:8px;font-weight:bold;">📋 選択した回答</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:white;border-radius:8px;padding:8px;display:flex;align-items:center;gap:8px;">
        <div style="width:20px;height:20px;border-radius:50%;background:#ef4444;"></div>
        <span style="font-size:14px;">「うさぎ」に</span>
        <span style="font-size:18px;">○</span>
        <button style="margin-left:auto;border:none;background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px;">消す</button>
      </div>
      <div style="background:white;border-radius:8px;padding:8px;display:flex;align-items:center;gap:8px;">
        <div style="width:20px;height:20px;border-radius:50%;background:#3b82f6;"></div>
        <span style="font-size:14px;">「さる」に</span>
        <span style="font-size:18px;">✕</span>
        <button style="margin-left:auto;border:none;background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px;">消す</button>
      </div>
    </div>
    <button style="margin-top:10px;width:100%;padding:8px;border-radius:10px;border:none;background:#fbbf24;font-weight:bold;font-size:14px;cursor:pointer;">この回答で決定する →</button>
  </div>

</div>

<div class="options" style="margin-top:16px;">
  <div class="option" data-choice="yes" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>このイメージで合っています</h3>
      <p>① 色 → ② 回答 → ③ 形 の3段階選択。結果を下に表示</p>
    </div>
  </div>
  <div class="option" data-choice="change" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>レイアウトを変えたい</h3>
      <p>順番・配置・見た目を調整したい</p>
    </div>
  </div>
</div>
